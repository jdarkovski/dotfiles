# ------------------------------------------------------------
# prefix
# ------------------------------------------------------------

# Change the default prefix from Ctrl-b to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ------------------------------------------------------------
# general behavior
# ------------------------------------------------------------

# Enable mouse support for pane selection and scrolling
set -g mouse on

# Start windows and panes counting from 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows after one is closed
set -g renumber-windows on

# Increase scrollback history
set -g history-limit 100000

# Faster escape sequence handling
set -sg escape-time 10

# ------------------------------------------------------------
# splits
# ------------------------------------------------------------

# More intuitive split keys
unbind '"'
unbind %

bind | split-window -h
bind - split-window -v

# Open new panes in the current pane's directory
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ------------------------------------------------------------
# pane navigation
# ------------------------------------------------------------

# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ------------------------------------------------------------
# reload config
# ------------------------------------------------------------

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# ------------------------------------------------------------
# status bar
# ------------------------------------------------------------

set -g status-position bottom
set -g status-left-length 30
set -g status-right-length 60

set -g status-left "#S "
set -g status-right "#{?client_prefix,#[bold]PREFIX ,} %Y-%m-%d %H:%M "

# ------------------------------------------------------------
# terminal colors
# ------------------------------------------------------------

# Enable true color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"